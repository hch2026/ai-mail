name: ai-mail

services:
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: /app/data/mail.db
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 3000
      WEB_ORIGIN: http://localhost:8080
    volumes:
      - mail-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    depends_on:
      server:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  mail-data:
